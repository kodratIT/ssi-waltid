# HTTP Client Configuration for Wallet API
# Timeout values in milliseconds

httpClient {
    # Connection timeout - time to establish connection
    connectTimeout = 30000  # 30 seconds
    
    # Socket timeout - time to wait for data
    socketTimeout = 120000  # 120 seconds (2 minutes)
    
    # Request timeout - overall request timeout
    requestTimeout = 120000  # 120 seconds (2 minutes)
    
    # Follow redirects
    followRedirects = true
    
    # Max redirects
    maxRedirects = 5
}
